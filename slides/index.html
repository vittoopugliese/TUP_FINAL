<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspectionsApp — Presentación</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&amp;family=Roboto:wght@300;400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/base.css" />
    <style id="slide-dynamic-style"></style>
</head>

<body>
    <div id="brand-bar">
        <img class="brand-logo" src='assets/logo.png' width='64' height='64' alt=""
            onerror="this.onerror=null;this.src='assets/logo.svg';" />
        <span class="brand-name">InspectionsApp</span>
    </div>
    <div id="viewport">
        <div id="stage-scale">
            <div id="slide-mount"></div>
        </div>
    </div>
    <nav id="slide-nav" aria-label="Navegación de diapositivas">
        <button type="button" id="nav-prev" aria-label="Diapositiva anterior">
            <i class="fas fa-chevron-left" aria-hidden="true"></i>
        </button>
        <span id="nav-counter">1</span>
        <button type="button" id="nav-next" aria-label="Diapositiva siguiente">
            <i class="fas fa-chevron-right" aria-hidden="true"></i>
        </button>
        <button type="button" id="nav-fs" aria-label="Pantalla completa" title="Pantalla completa">
            <i class="fas fa-expand" aria-hidden="true"></i>
        </button>
    </nav>
    <script type="module" src="js/app.js"></script>
</body>

</html>
