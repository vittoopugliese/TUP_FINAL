# ===========================
# Datasource – H2 en memoria
# ===========================
spring.datasource.url=jdbc:h2:mem:inspectionsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===========================
# Inicialización de DB con schema.sql
# ===========================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# ===========================
# H2 Console (solo dev)
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JWT
# ===========================
app.jwt.secret=InspectionsS3cr3tK3yForJWTThatIsLongEnoughForHS256Algorithm!2024
app.jwt.expiration-ms=86400000

# ===========================
# Servidor
# ===========================
server.port=8080

# ===========================
# Logging
# ===========================
logging.level.com.inspections=DEBUG
logging.level.org.springframework.security=WARN
