# ===========================
# Perfil: PostgreSQL
# ===========================
# Activa este perfil para conectar a PostgreSQL en lugar de H2, por ejemplo:
#   --spring.profiles.active=postgres
# o variable de entorno: SPRING_PROFILES_ACTIVE=postgres
#
# Ajusta URL, usuario y contraseña a tu servidor (o usa variables de entorno).
# ===========================

# Conexión JDBC a PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inspectionsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:inspections}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:inspections}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate – dialecto de PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# No ejecutar schema.sql / data.sql del classpath al arrancar con PostgreSQL
# (en producción suele usarse Flyway/Liquibase o carga manual).
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Consola H2 no aplica cuando el motor es PostgreSQL
spring.h2.console.enabled=false
