# ===========================
# Perfil PostgreSQL
# Activa con: spring.profiles.active=postgres en application.properties
# ===========================

# URL JDBC: protocolo PostgreSQL, host local, puerto 5432, nombre de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/inspectionsdb

# Controlador JDBC que Spring usa para conectar con PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Usuario de la base de datos PostgreSQL (ajustar según tu instalación)
spring.datasource.username=postgres

# Contraseña del usuario de PostgreSQL (ajustar según tu instalación)
spring.datasource.password=postgres

# Dialecto de Hibernate para generar SQL compatible con PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desactiva la ejecución automática de schema.sql y data.sql (Hibernate ddl-auto u otros gestionan el esquema)
spring.sql.init.mode=never

# Ejecuta los scripts SQL de inicialización después de que Hibernate cree/actualice el esquema (no aplica si init.mode=never)
spring.jpa.defer-datasource-initialization=false

# La consola web de H2 no existe para PostgreSQL; se desactiva explícitamente
spring.h2.console.enabled=false
