# ===========================
# Datasource – H2 en memoria
# ===========================
spring.datasource.url=jdbc:h2:mem:inspectionsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# Jackson / JSON
# ===========================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===========================
# Inicialización de DB con schema.sql y data.sql
# ===========================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ===========================
# H2 Console (solo dev)
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JWT
# ===========================
app.jwt.secret=InspectionsS3cr3tK3yForJWTThatIsLongEnoughForHS256Algorithm!2024
app.jwt.expiration-ms=86400000

# ===========================
# Servidor
# ===========================
server.port=8080

# ===========================
# Logging
# ===========================
logging.level.com.inspections=DEBUG
logging.level.org.springframework.security=WARN

# ===========================
# Email (Gmail SMTP)
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@inspections.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===========================
# Password Reset
# ===========================
app.password-reset.expiration-minutes=15
app.password-reset.base-url=http://localhost:8080

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

